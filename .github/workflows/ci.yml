# =====================================================================
# CI — Osyanificación Plugin Moodle
# =====================================================================
# Workflow inicial para Sprint 0.
#
# Jobs activos AHORA:
#   - validate-yaml      → lint del docker-compose.yml y los workflows
#   - validate-structure → verifica que carpetas/archivos clave existen
#   - secret-scan        → detecta secretos commiteados (gitleaks)
#   - markdown-lint      → valida formato de los .md
#   - json-validate      → valida sintaxis de seeds/*.json
#
# Jobs por activar (cuando aplique):
#   - php-lint        → Sprint 2 (cuando haya .php files reales)
#   - moodle-plugin-ci → Sprint 3 (cuando exista code/local/osyanificacion/version.php)
#   - phpunit         → Sprint 3 (con primer test del leaderboard)
#   - behat           → Sprint 3+ (tests E2E)
# =====================================================================

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:  # permite correr manualmente desde Actions UI

jobs:
  # -------------------------------------------------------------------
  # Validar sintaxis YAML del compose + workflows
  # Es el lint mínimo viable mientras no hay código PHP.
  # -------------------------------------------------------------------
  validate-yaml:
    name: Validate YAML
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install yamllint
        run: pip install yamllint

      - name: Lint docker-compose.yml
        run: |
          yamllint \
            -d "{extends: relaxed, rules: {line-length: disable, comments: disable, document-start: disable}}" \
            docker-compose.yml

      - name: Lint workflows
        run: |
          yamllint \
            -d "{extends: relaxed, rules: {line-length: disable, comments: disable, document-start: disable, truthy: disable}}" \
            .github/workflows/

  # -------------------------------------------------------------------
  # Validar estructura del plugin (smoke test)
  # Verifica que ciertos archivos existan a medida que se vayan creando.
  # Por ahora solo chequea que la estructura de carpetas esté correcta.
  # -------------------------------------------------------------------
  validate-structure:
    name: Validate Repo Structure
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify required directories exist
        run: |
          set -e
          for dir in \
            "code/local/osyanificacion" \
            "code/blocks" \
            "docs" \
            "seeds" \
            "presentation"; do
            if [ ! -d "$dir" ]; then
              echo "::error::Missing required directory: $dir"
              exit 1
            fi
          done
          echo "✅ All required directories exist"

      - name: Verify required files exist
        run: |
          set -e
          for file in \
            "README.md" \
            "LICENSE" \
            "CONTRIBUTING.md" \
            "KNOWN_ISSUES.md" \
            ".gitignore" \
            "docker-compose.yml" \
            ".env.example"; do
            if [ ! -f "$file" ]; then
              echo "::error::Missing required file: $file"
              exit 1
            fi
          done
          echo "✅ All required files exist"

  # -------------------------------------------------------------------
  # Secret scan — detecta secretos accidentalmente commiteados
  # (.env real, API keys, passwords, tokens, certificates)
  # -------------------------------------------------------------------
  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history para escanear todos los commits)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks v8.18.4
        run: |
          GITLEAKS_VERSION="8.18.4"
          wget -q "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          tar -xzf "gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          sudo mv gitleaks /usr/local/bin/
          gitleaks version

      - name: Run gitleaks on full git history
        run: gitleaks detect --no-banner --redact -v --exit-code 1

  # -------------------------------------------------------------------
  # Markdown lint — valida formato de los .md del repo
  # Config en .markdownlint.jsonc (reglas razonables para docs técnicas).
  #
  # IMPORTANTE: NO usamos DavidAnson/markdownlint-cli2-action@v15 porque
  # en intento previo no respetaba el config por auto-discovery
  # (ver historia del repo: PR #4 revertido en PR #5).
  # Acá corremos markdownlint-cli2 directo via npm con --config explícito.
  # -------------------------------------------------------------------
  markdown-lint:
    name: Markdown lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install markdownlint-cli2
        run: npm install -g markdownlint-cli2@0.13.0

      - name: Show config that will be used (debug)
        run: |
          echo "--- .markdownlint.jsonc ---"
          cat .markdownlint.jsonc
          echo "---"
          markdownlint-cli2 --version

      - name: Run markdownlint-cli2 with explicit config
        run: |
          markdownlint-cli2 \
            --config .markdownlint.jsonc \
            "**/*.md" \
            "#node_modules"

  # -------------------------------------------------------------------
  # JSON validate — verifica sintaxis de seeds/*.json
  # Evita que un seed roto se cuele a main y rompa el setup de alguien.
  # Skipea con éxito si no hay seeds (compatibilidad con cualquier estado).
  # -------------------------------------------------------------------
  json-validate:
    name: JSON validate (seeds)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify jq is available
        run: jq --version

      - name: Validate all seeds/*.json files
        run: |
          set -e
          shopt -s nullglob
          files=(seeds/*.json)
          if [ ${#files[@]} -eq 0 ]; then
            echo "⏭️  No JSON files in seeds/ to validate — skipping"
            exit 0
          fi
          for f in "${files[@]}"; do
            echo "Validating $f"
            jq empty "$f" || { echo "::error file=$f::Invalid JSON syntax"; exit 1; }
          done
          echo "✅ All ${#files[@]} JSON file(s) are syntactically valid"

